<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Bonk!</title>
<style>
body {
    background: #111;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
    font-family: Arial, sans-serif;

    
    cursor: url('hammer.cur'), auto;
}

#photo {
    width: 300px;
    border-radius: 12px;

   
    cursor: url('hammer.cur'), auto;
}


.shake {
    animation: shake 0.15s linear;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    50% { transform: translateX(6px); }
    75% { transform: translateX(-6px); }
    100% { transform: translateX(0); }
}
</style>
</head>
<body>

<h2>Нажми на фото чтобы пиздануть артема</h2>

<img id="photo" src="photo.png">
<audio id="bonk-sound" src="bonk.mp3"></audio>

<script>
const photo = document.getElementById("photo");
const sound = document.getElementById("bonk-sound");

photo.onclick = () => {
    photo.classList.remove("shake");
    void photo.offsetWidth; 
    photo.classList.add("shake");

    sound.currentTime = 0;
    sound.play();
};
</script>

</body>
</html>
