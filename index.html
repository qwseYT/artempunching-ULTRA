<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔨 БОНК! 🔨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0a0a0f;
  cursor: url('hammer.cur'), auto;
  overflow: hidden;
  position: relative;
}

/* ===== ANIMATED BACKGROUND ===== */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(circle at 20% 50%, #1a0533 0%, #0a0a0f 50%, #0d0d1a 100%);
}
.bg::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 30% 40%, rgba(255,50,50,0.12) 0%, transparent 50%),
    radial-gradient(circle at 70% 60%, rgba(100,50,255,0.10) 0%, transparent 50%),
    radial-gradient(circle at 50% 80%, rgba(255,200,50,0.06) 0%, transparent 50%);
  animation: bgPulse 6s ease-in-out infinite;
}
@keyframes bgPulse {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}

/* grid overlay */
.bg::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* ===== FLOATING PARTICLES ===== */
#particleCanvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

/* ===== MAIN CARD ===== */
.container {
  position: relative; z-index: 2;
  text-align: center;
  padding: 40px 50px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 32px;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow:
    0 25px 60px rgba(0,0,0,0.6),
    inset 0 0 80px rgba(255,50,50,0.03);
  max-width: 520px;
  width: 90%;
}

.container.screen-shake {
  animation: screenShake 0.35s cubic-bezier(0.36,0.07,0.19,0.97);
}
@keyframes screenShake {
  0%  { transform: translate(0,0) rotate(0deg); }
  8%  { transform: translate(-6px,-4px) rotate(-0.6deg); }
  16% { transform: translate(5px,3px) rotate(0.5deg); }
  24% { transform: translate(-7px,1px) rotate(-0.4deg); }
  32% { transform: translate(6px,-3px) rotate(0.6deg); }
  40% { transform: translate(-3px,4px) rotate(-0.3deg); }
  48% { transform: translate(4px,-2px) rotate(0.4deg); }
  56% { transform: translate(-5px,3px) rotate(-0.5deg); }
  64% { transform: translate(3px,-4px) rotate(0.3deg); }
  72% { transform: translate(-2px,2px) rotate(-0.2deg); }
  80% { transform: translate(2px,-1px) rotate(0.2deg); }
  100%{ transform: translate(0,0) rotate(0deg); }
}

/* ===== TITLE ===== */
h1 {
  font-size: 2.6rem;
  font-weight: 900;
  background: linear-gradient(135deg, #ff4444, #ff8800, #ffcc00, #ff4444);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradShift 3s ease infinite;
  margin-bottom: 6px;
  letter-spacing: 3px;
  text-transform: uppercase;
}
@keyframes gradShift {
  0%  { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100%{ background-position: 0% 50%; }
}

.subtitle {
  color: rgba(255,255,255,0.35);
  font-size: 0.8rem;
  margin-bottom: 22px;
  letter-spacing: 5px;
  text-transform: uppercase;
  font-weight: 400;
}

/* ===== GLOW LINE ===== */
.glow-line {
  width: 80px; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,80,80,0.5), transparent);
  margin: 14px auto;
}

/* ===== STATS ===== */
.stats {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin: 0 0 6px;
}
.stat-item { text-align: center; }
.stat-value {
  font-size: 1.9rem;
  font-weight: 900;
  color: #fff;
  line-height: 1;
  transition: transform 0.15s ease;
}
.stat-value.combo {
  background: linear-gradient(135deg, #ff4444, #ff8800);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-value.best {
  background: linear-gradient(135deg, #ffd700, #ff8800);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-label {
  font-size: 0.65rem;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-top: 4px;
}

/* ===== PHOTO ===== */
.photo-wrapper {
  position: relative;
  display: inline-block;
  margin: 6px 0 4px;
}
.photo-wrapper::before {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 20px;
  background: linear-gradient(135deg, rgba(255,50,50,0.25), rgba(255,150,50,0.25), rgba(200,50,255,0.25));
  z-index: -1;
  opacity: 0;
  transition: opacity 0.4s ease;
  filter: blur(10px);
}
.photo-wrapper:hover::before { opacity: 1; }

#photo {
  width: 260px; height: 260px;
  object-fit: cover;
  border-radius: 16px;
  display: block;
  cursor: url('hammer.cur'), auto;
  transition: transform 0.15s ease, box-shadow 0.3s ease;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  user-select: none;
  -webkit-user-drag: none;
}
#photo:hover {
  transform: scale(1.03);
  box-shadow: 0 12px 40px rgba(255,50,50,0.2);
}
#photo:active { transform: scale(0.95); }

/* enhanced bonk shake */
#photo.bonk-shake {
  animation: bonkShake 0.45s cubic-bezier(0.36,0.07,0.19,0.97);
}
@keyframes bonkShake {
  0%  { transform: translate(0,0) rotate(0deg) scale(1); }
  8%  { transform: translate(-12px,-8px) rotate(-3deg) scale(1.08); }
  16% { transform: translate(10px,6px) rotate(3deg) scale(1.03); }
  24% { transform: translate(-14px,-3px) rotate(-2.5deg) scale(0.96); }
  32% { transform: translate(12px,8px) rotate(2.5deg) scale(1.05); }
  40% { transform: translate(-8px,-5px) rotate(-1.5deg) scale(0.98); }
  48% { transform: translate(8px,4px) rotate(1.5deg) scale(1.02); }
  56% { transform: translate(-6px,-4px) rotate(-1deg) scale(0.99); }
  64% { transform: translate(6px,2px) rotate(1deg) scale(1.01); }
  72% { transform: translate(-4px,-3px) rotate(-0.5deg) scale(0.99); }
  80% { transform: translate(3px,1px) rotate(0.5deg) scale(1); }
  100%{ transform: translate(0,0) rotate(0deg) scale(1); }
}

/* ===== BONK FLOATING TEXT ===== */
.bonk-text {
  position: fixed;
  pointer-events: none;
  font-size: 2.8rem;
  font-weight: 900;
  z-index: 100;
  animation: bonkFloat 1.2s ease-out forwards;
  text-transform: uppercase;
  letter-spacing: 4px;
  text-shadow: 0 0 20px currentColor, 0 0 60px currentColor;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
}
@keyframes bonkFloat {
  0%   { opacity: 1; transform: translateY(0) scale(0.5) rotate(-10deg); }
  30%  { opacity: 1; transform: translateY(-30px) scale(1.3) rotate(5deg); }
  100% { opacity: 0; transform: translateY(-160px) scale(1.8) rotate(0deg); }
}

/* ===== RIPPLE ===== */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,200,100,0.5), transparent);
  transform: scale(0);
  animation: rippleAnim 0.7s ease-out forwards;
  pointer-events: none;
}
@keyframes rippleAnim {
  to { transform: scale(5); opacity: 0; }
}

/* ===== HIT BURST ===== */
.hit-burst {
  position: fixed;
  pointer-events: none;
  z-index: 99;
  border-radius: 50%;
  animation: hitBurst 0.6s ease-out forwards;
}
@keyframes hitBurst {
  0%   { transform: scale(0); opacity: 1; }
  100% { transform: scale(12); opacity: 0; }
}

/* ===== ACHIEVEMENT TOAST ===== */
.achievement {
  position: fixed;
  top: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(-120px);
  background: rgba(255,215,0,0.08);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,215,0,0.25);
  border-radius: 18px;
  padding: 18px 34px;
  color: #fff;
  z-index: 1000;
  transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
  text-align: center;
  pointer-events: none;
  box-shadow: 0 8px 40px rgba(255,215,0,0.1);
}
.achievement.show { transform: translateX(-50%) translateY(0); }
.achievement-title {
  font-size: 1.3rem;
  font-weight: 700;
  color: #ffd700;
}
.achievement-desc {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.55);
  margin-top: 4px;
}

/* ===== ASCENSION (5000 BONKS) ===== */
.ascension {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.8s ease;
}
.ascension.active {
  opacity: 1;
  pointer-events: all;
}

.ascension-void {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, #fff 0%, rgba(255,255,255,0.95) 25%, rgba(240,235,255,0.5) 50%, transparent 75%);
  animation: ascVoid 5s ease-in forwards;
}
@keyframes ascVoid {
  0%   { opacity: 0; transform: scale(0.1); }
  30%  { opacity: 0.6; transform: scale(1.2); }
  60%  { opacity: 1; transform: scale(2); }
  100% { opacity: 1; transform: scale(4); }
}

.ascension-vortex {
  position: absolute;
  inset: 0;
  background:
    repeating-conic-gradient(from 0deg at 50% 50%, rgba(255,255,255,0.04) 0deg 8deg, transparent 8deg 16deg);
  animation: ascVortex 6s linear forwards;
}
@keyframes ascVortex {
  0%   { opacity: 0; transform: scale(0.3) rotate(0deg); }
  25%  { opacity: 0.5; transform: scale(0.8) rotate(180deg); }
  50%  { opacity: 0.7; transform: scale(1.2) rotate(360deg); }
  75%  { opacity: 0.4; transform: scale(1.6) rotate(540deg); }
  100% { opacity: 0; transform: scale(2.5) rotate(720deg); }
}

.ascension-img {
  position: relative;
  z-index: 2;
  width: 260px;
  height: 260px;
  border-radius: 16px;
  object-fit: cover;
  animation: ascImg 5.5s cubic-bezier(0.55, 0.06, 0.1, 1) forwards;
  will-change: transform, opacity, filter;
}
@keyframes ascImg {
  0% {
    transform: translateY(0) rotate(0deg) scale(1);
    opacity: 1;
    filter: brightness(1) saturate(1);
    box-shadow: 0 0 0 rgba(255,255,255,0);
  }
  20% {
    transform: translateY(-20px) rotate(120deg) scale(1.02);
    opacity: 1;
    filter: brightness(1.2) saturate(0.9);
    box-shadow: 0 0 40px rgba(255,255,255,0.15);
  }
  40% {
    transform: translateY(-60px) rotate(420deg) scale(0.95);
    opacity: 1;
    filter: brightness(1.8) saturate(0.6);
    box-shadow: 0 0 80px rgba(255,255,255,0.3);
  }
  60% {
    transform: translateY(-130px) rotate(1080deg) scale(0.7);
    opacity: 0.9;
    filter: brightness(3) saturate(0.3);
    box-shadow: 0 0 120px rgba(255,255,255,0.5);
  }
  80% {
    transform: translateY(-240px) rotate(2160deg) scale(0.35);
    opacity: 0.5;
    filter: brightness(5) saturate(0.1);
    box-shadow: 0 0 160px rgba(255,255,255,0.7);
  }
  100% {
    transform: translateY(-400px) rotate(3600deg) scale(0);
    opacity: 0;
    filter: brightness(10) saturate(0);
    box-shadow: 0 0 200px rgba(255,255,255,1);
  }
}

.ascension-text {
  position: relative;
  z-index: 2;
  color: #fff;
  font-size: 1.6rem;
  font-weight: 900;
  text-align: center;
  max-width: 500px;
  line-height: 1.4;
  margin-top: 24px;
  text-shadow: 0 0 40px rgba(255,255,255,0.6), 0 4px 20px rgba(0,0,0,0.3);
  opacity: 0;
  animation: ascText 2s ease 3.2s forwards;
}
@keyframes ascText {
  0%   { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

.ascension-light-particles {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}
.ascension-particle {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, #fff, rgba(255,255,200,0.6));
  animation: ascParticle var(--dur) ease-out forwards;
  pointer-events: none;
}
@keyframes ascParticle {
  0%   { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
}

.ascension-close {
  position: absolute;
  z-index: 3;
  bottom: 40px;
  font-size: 0.85rem;
  color: rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 30px;
  padding: 10px 24px;
  cursor: pointer;
  transition: all 0.3s ease;
  opacity: 0;
  animation: ascClose 1s ease 4.5s forwards;
}
.ascension-close:hover {
  background: rgba(255,255,255,0.12);
  color: #fff;
}
@keyframes ascClose {
  to { opacity: 1; }
}

/* ===== HINT ===== */
.hint {
  color: rgba(255,255,255,0.18);
  font-size: 0.7rem;
  margin-top: 12px;
  letter-spacing: 1px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
  .container { padding: 24px 18px; }
  h1 { font-size: 1.7rem; }
  #photo { width: 200px; height: 200px; }
  .stat-value { font-size: 1.4rem; }
  .stats { gap: 20px; }
  .bonk-text { font-size: 2rem; }
}
</style>
</head>
<body>

<!-- BACKGROUND -->
<div class="bg"></div>
<canvas id="particleCanvas"></canvas>

<!-- MAIN CARD -->
<div class="container" id="container">
  <h1>🔨 БОНК 🔨</h1>
  <p class="subtitle">Система воспитания артема</p>

  <div class="stats">
    <div class="stat-item">
      <div class="stat-value" id="scoreDisplay">0</div>
      <div class="stat-label">Бонков</div>
    </div>
    <div class="stat-item">
      <div class="stat-value combo" id="comboDisplay">0</div>
      <div class="stat-label">Комбо</div>
    </div>
    <div class="stat-item">
      <div class="stat-value best" id="bestDisplay">0</div>
      <div class="stat-label">Рекорд</div>
    </div>
  </div>

  <div class="glow-line"></div>

  <div class="photo-wrapper" id="photoWrapper">
    <img id="photo" src="photo.png" alt="Артем" draggable="false">
  </div>

  <div class="glow-line"></div>

  <p class="hint">Кликай быстрее для комбо 🔥<br>Пробел / Enter тоже работают</p>
</div>

<audio id="bonk-sound" src="bonk.mp3" preload="auto"></audio>

<div class="achievement" id="achievement">
  <div class="achievement-title">🏆 Достижение!</div>
  <div class="achievement-desc" id="achievementDesc"></div>
</div>

<div class="ascension" id="ascension">
  <div class="ascension-void"></div>
  <div class="ascension-vortex"></div>
  <div class="ascension-light-particles" id="ascParticles"></div>
  <img class="ascension-img" id="ascensionImg" src="photo.png" alt="">
  <div class="ascension-text">😇 Вы уебали Артёма!<br>Он улетел к своей матери на небеса!</div>
  <button class="ascension-close" id="ascCloseBtn">👆 Кликни чтобы продолжить</button>
</div>

<script>
// ===== FLOATING BACKGROUND PARTICLES =====
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2.5 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.25;
    this.speedY = (Math.random() - 0.5) * 0.25;
    this.opacity = Math.random() * 0.3 + 0.05;
    this.hue = Math.random() * 60 + 340;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${this.opacity})`;
    ctx.fill();
  }
}

for (let i = 0; i < 100; i++) particles.push(new Particle());

function animParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animParticles);
}
animParticles();

// ===== BONK SYSTEM =====
const photo = document.getElementById('photo');
const sound = document.getElementById('bonk-sound');
const scoreDisplay = document.getElementById('scoreDisplay');
const comboDisplay = document.getElementById('comboDisplay');
const bestDisplay = document.getElementById('bestDisplay');
const container = document.getElementById('container');
const photoWrapper = document.getElementById('photoWrapper');
const achievement = document.getElementById('achievement');
const achievementDesc = document.getElementById('achievementDesc');

let score = parseInt(localStorage.getItem('bonkScore')) || 0;
let combo = 0;
let bestCombo = parseInt(localStorage.getItem('bonkBestCombo')) || 0;
let lastBonkTime = 0;
const COMBO_WINDOW = 1200;

scoreDisplay.textContent = score;
bestDisplay.textContent = bestCombo;

const ACHIEVEMENTS = {
  1:    '🥚 Первый бонк!',
  10:   '🔨 Пиздюльщик-любитель',
  50:   '⚡ Опытный бонкер',
  100:  '💀 Мастер бонка',
  250:  '🔥 Легендарный бонкер',
  500:  '👑 Артем в нокауте',
  1000: '💀💀💀 АБСОЛЮТНЫЙ БОНК',
  2500: '👑👑👑 ИМПЕРАТОР БОНКА',
  5000: '😇 Вы уебали Артёма! Он улетел к своей матери на небеса!',
};

const BONK_WORDS = [
  'БОНК!', '💥', 'ПИЗДЮЛЬ!', '🥴', 'ОПА!', '🤕',
  'ЕЩЁ!', '🔥', '😵', 'BONK!', '💫',
  'НОКАУТ!', '✨', '💢', 'БАМ!', '🤯',
  '💀', '😤', '👊', '⚡',
];

function playBonk() {
  const now = Date.now();

  // Combo
  if (now - lastBonkTime < COMBO_WINDOW) {
    combo++;
  } else {
    combo = 1;
  }
  lastBonkTime = now;

  if (combo > bestCombo) {
    bestCombo = combo;
    localStorage.setItem('bonkBestCombo', bestCombo);
    bestDisplay.textContent = bestCombo;
    bestDisplay.style.transform = 'scale(1.4)';
    setTimeout(() => bestDisplay.style.transform = 'scale(1)', 250);
  }

  score++;
  localStorage.setItem('bonkScore', score);

  // Update counters
  scoreDisplay.textContent = score;
  comboDisplay.textContent = combo;

  // Pop animation
  scoreDisplay.style.transform = 'scale(1.35)';
  setTimeout(() => scoreDisplay.style.transform = 'scale(1)', 200);
  comboDisplay.style.transform = 'scale(1.35)';
  setTimeout(() => comboDisplay.style.transform = 'scale(1)', 200);

  // Sound (clone to allow overlapping)
  const snd = sound.cloneNode();
  snd.playbackRate = 0.85 + Math.random() * 0.35 + Math.min(combo * 0.008, 0.15);
  snd.volume = Math.min(0.5 + combo * 0.02, 1);
  snd.play().then(() => snd.addEventListener('ended', () => snd.remove())).catch(() => snd.remove());

  // Photo shake
  photo.classList.remove('bonk-shake');
  void photo.offsetWidth;
  photo.classList.add('bonk-shake');

  // Screen shake
  container.classList.remove('screen-shake');
  void container.offsetWidth;
  container.classList.add('screen-shake');

  // Floating BONK! text
  const word = BONK_WORDS[Math.floor(Math.random() * BONK_WORDS.length)];
  const bonkEl = document.createElement('div');
  bonkEl.className = 'bonk-text';
  bonkEl.textContent = word;

  const rect = photo.getBoundingClientRect();
  const hue = 340 + Math.random() * 50;
  bonkEl.style.color = `hsl(${hue}, 100%, 65%)`;
  bonkEl.style.left = (rect.left + rect.width / 2 - 60 + (Math.random() - 0.5) * 140) + 'px';
  bonkEl.style.top = (rect.top - 30 + (Math.random() - 0.5) * 50) + 'px';
  document.body.appendChild(bonkEl);
  setTimeout(() => bonkEl.remove(), 1200);

  // Particle burst
  const burstCount = 10 + Math.floor(Math.random() * 8);
  for (let i = 0; i < burstCount; i++) {
    const hit = document.createElement('div');
    hit.className = 'hit-burst';
    const angle = Math.random() * Math.PI * 2;
    const dist = 20 + Math.random() * 60;
    hit.style.left = (rect.left + rect.width / 2 + Math.cos(angle) * dist) + 'px';
    hit.style.top = (rect.top + rect.height / 2 + Math.sin(angle) * dist) + 'px';
    const size = 6 + Math.random() * 24;
    hit.style.width = size + 'px';
    hit.style.height = size + 'px';
    const h = Math.random() * 60 + 340;
    hit.style.background = `radial-gradient(circle, hsla(${h}, 100%, 60%, 0.7), transparent)`;
    document.body.appendChild(hit);
    setTimeout(() => hit.remove(), 600);
  }

  // Ripple on photo
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  ripple.style.left = (Math.random() * rect.width) + 'px';
  ripple.style.top = (Math.random() * rect.height) + 'px';
  ripple.style.width = '40px';
  ripple.style.height = '40px';
  photoWrapper.appendChild(ripple);
  setTimeout(() => ripple.remove(), 700);

  // Achievements
  checkAchievements(score);
}

// ===== ACHIEVEMENTS =====
function checkAchievements(score) {
  const tiers = Object.keys(ACHIEVEMENTS).map(Number).sort((a, b) => a - b);
  for (const tier of tiers) {
    if (score >= tier && !localStorage.getItem('bonk_ach_' + tier)) {
      showAchievement(ACHIEVEMENTS[tier]);
      localStorage.setItem('bonk_ach_' + tier, 'true');
      if (tier === 5000) triggerAscension();
    }
  }
}

let achTimeout = null;
function showAchievement(text) {
  achievementDesc.textContent = text;
  achievement.classList.add('show');
  if (achTimeout) clearTimeout(achTimeout);
  achTimeout = setTimeout(() => achievement.classList.remove('show'), 3500);
}

// ===== ASCENSION (5000 BONKS) =====
const ascension = document.getElementById('ascension');
const ascImg = document.getElementById('ascensionImg');
const ascParticles = document.getElementById('ascParticles');
const ascCloseBtn = document.getElementById('ascCloseBtn');
let ascensionActive = false;

function triggerAscension() {
  if (ascensionActive) return;
  ascensionActive = true;

  // Enter fullscreen
  try { document.documentElement.requestFullscreen(); } catch (_) {}

  ascension.classList.add('active');

  // Spawn light particles sucked into the vortex
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'ascension-particle';
    const size = 3 + Math.random() * 12;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    const angle = Math.random() * 360;
    const dist = 50 + Math.random() * 300;
    const rad = angle * Math.PI / 180;
    p.style.left = (50 + Math.cos(rad) * dist / 10) + '%';
    p.style.top = (50 + Math.sin(rad) * dist / 10) + '%';
    p.style.setProperty('--dx', (-Math.cos(rad) * (100 + Math.random() * 200)) + 'px');
    p.style.setProperty('--dy', (-200 - Math.random() * 300) + 'px');
    p.style.setProperty('--dur', (1.5 + Math.random() * 2.5) + 's');
    p.style.animationDelay = (Math.random() * 2.5) + 's';
    ascParticles.appendChild(p);
    setTimeout(() => p.remove(), 6000);
  }

  // Play a slowed-down bonk sound
  const ascSnd = sound.cloneNode();
  ascSnd.playbackRate = 0.3;
  ascSnd.volume = 0.4;
  ascSnd.play().then(() => ascSnd.addEventListener('ended', () => ascSnd.remove())).catch(() => ascSnd.remove());
}

// Close ascension
ascCloseBtn.onclick = () => {
  ascension.classList.remove('active');
  ascensionActive = false;
  try { if (document.fullscreenElement) document.exitFullscreen(); } catch (_) {}
};

// ===== EVENTS =====
photo.onclick = playBonk;

document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    playBonk();
  }
});
</script>
